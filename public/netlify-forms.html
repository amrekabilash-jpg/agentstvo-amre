<!DOCTYPE html>
<html>
<head><title>Netlify Forms</title></head>
<body>
  <!-- Lead form (CTA sections) -->
  <form name="lead-form" data-netlify="true" data-netlify-honeypot="company" hidden>
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="tel" name="phone" />
    <input type="hidden" name="source" />
    <input type="text" name="company" />
  </form>

  <!-- Contact page form -->
  <form name="contact-form" data-netlify="true" data-netlify-honeypot="website" hidden>
    <input type="text" name="name" />
    <input type="email" name="email" />
    <textarea name="message"></textarea>
    <input type="text" name="website" />
  </form>
</body>
</html>
