<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B5FEF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E84393;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGradient)"/>
  
  <!-- Head circle -->
  <circle cx="100" cy="70" r="35" fill="white" opacity="0.9"/>
  
  <!-- Body -->
  <ellipse cx="100" cy="140" rx="45" ry="50" fill="white" opacity="0.8"/>
  
  <!-- Initials -->
  <text x="100" y="78" font-size="24" font-weight="bold" text-anchor="middle" fill="#5B5FEF" font-family="Arial">АК</text>
</svg>
